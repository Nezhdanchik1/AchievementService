databaseChangeLog:
  - changeSet:
      id: 3
      author: antigravity
      changes:
        - createTable:
            tableName: user_daily_activity
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: activity_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: activity_count
                  type: INTEGER
                  defaultValueNumeric: 0
