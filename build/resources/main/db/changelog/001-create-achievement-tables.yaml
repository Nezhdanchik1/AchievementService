databaseChangeLog:
  - changeSet:
      id: 1
      author: antigravity
      changes:
        - createTable:
            tableName: user_stats
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: total_xp
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: level
                  type: INTEGER
                  defaultValueNumeric: 1
              - column:
                  name: reputation
                  type: BIGINT
                  defaultValueNumeric: 0

        - createTable:
            tableName: user_direction_stats
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: direction_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: xp
                  type: BIGINT
                  defaultValueNumeric: 0
              - column:
                  name: level
                  type: INTEGER
                  defaultValueNumeric: 1

        - createTable:
            tableName: achievements
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: icon_url
                  type: VARCHAR(255)
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: target_count
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: direction_id
                  type: BIGINT

        - createTable:
            tableName: user_achievement_progress
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: achievement_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_achievement_achievement
                    referencedTableName: achievements
                    referencedColumnNames: id
              - column:
                  name: current_count
                  type: INTEGER
                  defaultValueNumeric: 0
              - column:
                  name: is_unlocked
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: unlocked_at
                  type: TIMESTAMP

        - createTable:
            tableName: processed_events
            columns:
              - column:
                  name: event_id
                  type: VARCHAR(255)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
